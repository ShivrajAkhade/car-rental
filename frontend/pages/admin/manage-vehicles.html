<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Vehicles - DriveRent Admin</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="brand-icon">🚗</span>
        <span>DriveRent</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links"></div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-user">
        <h4 id="adminName">Admin</h4>
        <p id="adminEmail">admin@gmail.com</p>
      </div>
      <a href="dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="manage-vehicles.html" class="active"><span class="sidebar-icon">🚗</span> Vehicles</a>
      <a href="manage-bookings.html"><span class="sidebar-icon">📋</span> Bookings</a>
      <a href="manage-users.html"><span class="sidebar-icon">👥</span> Users</a>
    </aside>

    <main class="admin-main">
      <div id="alert" class="alert"></div>
      <div class="data-table-wrapper">
        <div class="data-table-toolbar">
          <h3>All Vehicles</h3>
          <button class="btn btn-primary" onclick="openAddModal()">+ Add Vehicle</button>
        </div>
        <table class="data-table" id="vehiclesTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Brand</th>
              <th>Type</th>
              <th>Year</th>
              <th>Price/Day</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="vehicleModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Vehicle</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="vehicleForm">
        <div class="form-group">
          <label>Vehicle Name *</label>
          <input type="text" id="vehicleName" placeholder="e.g. Toyota Fortuner" required>
        </div>
        <div class="form-group">
          <label>Brand *</label>
          <input type="text" id="vehicleBrand" placeholder="e.g. Toyota" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
          <div class="form-group">
            <label>Type</label>
            <select id="vehicleType">
              <option value="SUV">SUV</option>
              <option value="Sedan">Sedan</option>
              <option value="Hatchback">Hatchback</option>
              <option value="Luxury">Luxury</option>
              <option value="MUV">MUV</option>
              <option value="Coupe">Coupe</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year *</label>
            <input type="number" id="vehicleYear" placeholder="2024" required min="2000" max="2030">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
          <div class="form-group">
            <label>Price per Day (₹) *</label>
            <input type="number" id="vehiclePrice" placeholder="e.g. 2500" required min="1" step="0.01">
          </div>
          <div class="form-group">
            <label>Seating Capacity</label>
            <input type="number" id="vehicleSeats" placeholder="5" min="1" max="50">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
          <div class="form-group">
            <label>Transmission</label>
            <select id="vehicleTransmission">
              <option value="Manual">Manual</option>
              <option value="Automatic">Automatic</option>
              <option value="CVT">CVT</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:24px;">
            <input type="checkbox" id="vehicleAvailable" checked style="width:auto;">
            <label for="vehicleAvailable" style="margin:0;">Available for rent</label>
          </div>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" id="vehicleImage" placeholder="https://example.com/car-image.jpg">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="vehicleDescription" placeholder="Describe the vehicle features..."></textarea>
        </div>
        <button type="submit" class="form-submit">Save Vehicle</button>
      </form>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/admin/manage-vehicles.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = api.getUser();
      if (user) {
        document.getElementById('adminName').textContent = user.name;
        document.getElementById('adminEmail').textContent = user.email;
      }
    });
  </script>
</body>
</html>
