<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - DriveRent</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="brand-icon">🚗</span>
        <span>DriveRent</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links"></div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-user">
        <h4 id="adminName">Admin</h4>
        <p id="adminEmail">admin@gmail.com</p>
      </div>
      <a href="dashboard.html" class="active">
        <span class="sidebar-icon">📊</span> Dashboard
      </a>
      <a href="manage-vehicles.html">
        <span class="sidebar-icon">🚗</span> Vehicles
      </a>
      <a href="manage-bookings.html">
        <span class="sidebar-icon">📋</span> Bookings
      </a>
      <a href="manage-users.html">
        <span class="sidebar-icon">👥</span> Users
      </a>
    </aside>

    <main class="admin-main">
      <h2>Dashboard</h2>
      <p>Overview of your rental business</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info">
            <h4 id="totalUsers">0</h4>
            <p>Total Users</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">🚗</div>
          <div class="stat-info">
            <h4 id="totalVehicles">0</h4>
            <p>Total Vehicles</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">📋</div>
          <div class="stat-info">
            <h4 id="totalBookings">0</h4>
            <p>Total Bookings</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">⏳</div>
          <div class="stat-info">
            <h4 id="pendingBookings">0</h4>
            <p>Pending</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info">
            <h4 id="confirmedBookings">0</h4>
            <p>Confirmed</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">❌</div>
          <div class="stat-info">
            <h4 id="cancelledBookings">0</h4>
            <p>Cancelled</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/admin/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = api.getUser();
      if (user) {
        document.getElementById('adminName').textContent = user.name;
        document.getElementById('adminEmail').textContent = user.email;
      }
    });
  </script>
</body>
</html>
